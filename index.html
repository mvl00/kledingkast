<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Kledingkast</title>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f5f5;
        }

        header{
            background:white;
            padding:20px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
            text-align:center;
        }

        h1{
            margin:0;
        }

        .container{
            max-width:700px;
            margin:auto;
            padding:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:15px;
            margin-bottom:15px;
            cursor:pointer;
            box-shadow:0 3px 8px rgba(0,0,0,.08);
            transition:.2s;
        }

        .card:hover{
            transform:scale(1.02);
        }

    </style>

</head>

<body>

<header>
<h1>👕 Mijn Kledingkast</h1>
</header>

<div class="container">

<div class="card">
👕 T-Shirts
</div>

<div class="card">
👖 Broeken
</div>

<div class="card">
🧥 Truien
</div>

<div class="card">
🧺 Wasmand
</div>

</div>

</body>
</html>
